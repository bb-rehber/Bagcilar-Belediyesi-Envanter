<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BT Envanter Dashboard</title>
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Tablo Tasarımı */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; cursor: pointer; }
        tr:hover { background: #f1f9ff; transition: 0.2s; }

        /* Kart (Modal) Tasarımı */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 12% auto; padding: 25px; width: 400px; border-radius: 10px; box-shadow: 0 5px 30px rgba(0,0,0,0.3); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(-20px);} to {opacity: 1; transform: translateY(0);} }
        
        .card-header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; font-size: 18px; color: var(--primary); }
        .detail-row { margin-bottom: 10px; display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .detail-label { color: #7f8c8d; font-size: 12px; }
        .detail-value { font-weight: bold; color: #333; }
        
        .close-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary);">📡 IT Bağlantı Rehberi</h2>
    
    <table>
        <thead>
            <tr>
                <th>BİRİM / MAHALLE</th>
                <th>DIŞ IP</th>
                <th>SERVİS SAĞLAYICI</th>
                <th>DEVRE ADI/NO</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr onclick="openCard('SANCAKTEPE', '960. Sokak No:5', '72.16.52.52', 'TÜRKNET', '152635623', 'Pl2024Pl', '100 Mbps', '23.04.2027')">
                <td><strong>SANCAKTEPE</strong></td>
                <td style="color: var(--accent); font-weight: bold;">72.16.52.52</td>
                <td>TÜRKNET</td>
                <td>152635623</td>
            </tr>
            <tr onclick="openCard('YAVUZ SELİM', 'Birlik Cd. No:147', '172.16.1.141', 'TÜRK TELEKOM', 'ucanevlerparki...', 'Pl2024Pl', '100/4 Mbps', '04.12.2029')">
                <td><strong>YAVUZ SELİM</strong></td>
                <td style="color: var(--accent); font-weight: bold;">172.16.1.141</td>
                <td>TÜRK TELEKOM</td>
                <td>ucanevlerparki...</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="birimModal" class="modal">
    <div class="modal-content">
        <div id="c-baslik" class="card-header"></div>
        
        <div class="detail-row"><span class="detail-label">ADRES:</span> <span id="c-adres" class="detail-value"></span></div>
        <div class="detail-row"><span class="detail-label">DIŞ IP:</span> <span id="c-ip" class="detail-value"></span></div>
        <div class="detail-row"><span class="detail-label">SAĞLAYICI:</span> <span id="c-servis" class="detail-value"></span></div>
        <div class="detail-row"><span class="detail-label">DEVRE NO:</span> <span id="c-devre" class="detail-value"></span></div>
        <div class="detail-row"><span class="detail-label">HIZ:</span> <span id="c-hiz" class="detail-value"></span></div>
        <div class="detail-row"><span class="detail-label">ŞİFRE:</span> <span id="c-sifre" class="detail-value" style="color: var(--success);"></span></div>
        <div class="detail-row"><span class="detail-label">TAAHHÜT BİTİŞ:</span> <span id="c-tarih" class="detail-value"></span></div>
        
        <button class="close-btn" onclick="closeCard()">Kapat</button>
        <div style="clear:both;"></div>
    </div>
</div>

<script>
    function openCard(birim, adres, ip, servis, devre, sifre, hiz, tarih) {
        document.getElementById('c-baslik').innerText = birim;
        document.getElementById('c-adres').innerText = adres;
        document.getElementById('c-ip').innerText = ip;
        document.getElementById('c-servis').innerText = servis;
        document.getElementById('c-devre').innerText = devre;
        document.getElementById('c-sifre').innerText = sifre;
        document.getElementById('c-hiz').innerText = hiz;
        document.getElementById('c-tarih').innerText = tarih;
        document.getElementById('birimModal').style.display = "block";
    }

    function closeCard() {
        document.getElementById('birimModal').style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('birimModal')) closeCard();
    }
</script>

</body>
</html>
